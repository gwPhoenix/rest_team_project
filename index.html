<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 자기소개서·면접 코치</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== AUTH OVERLAY ========== -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-badge">AI</div>
        <h1>자기소개서·면접 코치</h1>
        <p>경험을 직무 역량으로 변환하는 AI 취업 코치</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">로그인</button>
        <button class="auth-tab" id="tab-signup">회원가입</button>
      </div>
      <form id="auth-form" autocomplete="off">
        <div class="form-group" id="signup-name-group" style="display:none">
          <label class="form-label">이름</label>
          <input class="form-input" type="text" id="auth-name" placeholder="이름을 입력하세요" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" type="email" id="auth-email" placeholder="이메일을 입력하세요" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input class="form-input" type="password" id="auth-password" placeholder="비밀번호를 입력하세요 (6자 이상)" autocomplete="off">
        </div>
        <div class="auth-error" id="auth-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="auth-submit-btn">로그인</button>
        <div class="auth-divider"><span>또는</span></div>
        <button type="button" class="btn btn-google btn-full" id="google-signin-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#4285F4" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#34A853" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Google로 계속하기
        </button>
      </form>
    </div>
  </div>

  <!-- ========== API KEY MODAL ========== -->
  <div id="apikey-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <h2>OpenAI API 키 설정</h2>
        <button class="modal-close" id="close-apikey-modal">✕</button>
      </div>
      <p class="modal-desc">AI 코칭 기능을 사용하려면 OpenAI API 키가 필요합니다.<br>API 키는 브라우저 로컬에만 저장되며 외부로 전송되지 않습니다.</p>
      <div class="form-group">
        <label class="form-label">OpenAI API 키</label>
        <input class="form-input" type="password" id="apikey-input" placeholder="sk-...">
        <small class="form-hint">
          <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">OpenAI 플랫폼</a>에서 API 키를 발급받을 수 있습니다.
        </small>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="save-apikey-btn">저장하기</button>
        <button class="btn btn-ghost" id="skip-apikey-btn">나중에 설정</button>
      </div>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div id="app" style="display:none">
    <nav class="navbar">
      <div class="nav-container">
        <a href="#/" class="nav-logo">
          <div class="logo-badge-sm">AI</div>
          <span>취업 코치</span>
        </a>
        <div class="nav-links">
          <a href="#/" class="nav-link" data-nav="input">분석하기</a>
          <a href="#/history" class="nav-link" data-nav="history">성장 기록</a>
        </div>
        <div class="nav-actions">
          <button class="btn btn-ghost btn-icon" id="nav-apikey-btn" title="API 키 설정">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M5.64 5.64A10 10 0 0 0 18.36 18.36"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
          </button>
          <div class="user-menu" id="user-menu">
            <div class="user-avatar" id="user-avatar">U</div>
            <div class="user-dropdown" id="user-dropdown" style="display:none">
              <div class="user-info-block">
                <span class="user-display-name" id="user-name-display">사용자</span>
                <span class="user-display-email" id="user-email-display"></span>
              </div>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item" id="logout-btn">로그아웃</button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main id="page-container" class="page-container"></main>
  </div>

  <!-- ========== LOADING OVERLAY ========== -->
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <h3 id="loading-title">AI가 분석 중입니다</h3>
      <p id="loading-subtitle">잠시만 기다려 주세요...</p>
      <div class="loading-progress">
        <div class="progress-step" id="pstep-1">
          <div class="pstep-dot"></div>
          <span>경험 분석</span>
        </div>
        <div class="progress-step" id="pstep-2">
          <div class="pstep-dot"></div>
          <span>역량 변환</span>
        </div>
        <div class="progress-step" id="pstep-3">
          <div class="pstep-dot"></div>
          <span>피드백 생성</span>
        </div>
        <div class="progress-step" id="pstep-4">
          <div class="pstep-dot"></div>
          <span>질문 생성</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/openai.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/input.js"></script>
  <script src="js/pages/results.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
