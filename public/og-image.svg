<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 배경 원형 장식 -->
  <circle cx="1050" cy="80"  r="280" fill="#2563EB" opacity="0.07"/>
  <circle cx="1100" cy="580" r="200" fill="#10B981" opacity="0.06"/>
  <circle cx="100"  cy="500" r="180" fill="#7C3AED" opacity="0.06"/>

  <!-- 메인 카드 -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="url(#cardGrad)" stroke="#2563EB" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 좌측 서류가방 아이콘 영역 -->
  <rect x="100" y="110" width="120" height="120" rx="20" fill="#1E40AF" opacity="0.5"/>

  <!-- 서류가방 손잡이 -->
  <path d="M138 148V142a12 12 0 0 1 12-12h20a12 12 0 0 1 12 12v6"
        fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- 서류가방 몸통 -->
  <rect x="122" y="148" width="76" height="52" rx="8" fill="white" opacity="0.9"/>
  <rect x="122" y="172" width="76" height="6"  fill="#1E40AF" opacity="0.2"/>
  <rect x="148" y="166" width="24" height="12" rx="6" fill="#1E40AF"/>

  <!-- AI 배지 -->
  <circle cx="206" cy="118" r="22" fill="url(#badgeGrad)"/>
  <text x="206" y="126" text-anchor="middle"
        font-family="Arial Black, sans-serif" font-size="18"
        font-weight="900" fill="#1E3A8A">AI</text>

  <!-- 메인 타이틀 -->
  <text x="260" y="155" font-family="NanumGothic, Arial, sans-serif" font-size="20" font-weight="600" fill="#93C5FD">AI JOB COACH</text>
  <text x="260" y="215" font-family="NanumGothic, Arial, sans-serif" font-size="68" font-weight="800" fill="white">AI 취업 코치</text>

  <!-- 서브 타이틀 -->
  <text x="260" y="268" font-family="NanumGothic, Arial, sans-serif" font-size="28" fill="#94A3B8">경험을 직무 역량으로 변환하는 AI 취업 파트너</text>

  <!-- 구분선 -->
  <rect x="100" y="310" width="1000" height="1.5" fill="#2563EB" opacity="0.3"/>

  <!-- 기능 카드 4개 -->
  <!-- 카드 1 -->
  <rect x="100" y="335" width="220" height="100" rx="12" fill="#1E3A8A" opacity="0.5"/>
  <text x="120" y="375" font-family="NanumGothic, Arial, sans-serif" font-size="28">🎯</text>
  <text x="160" y="373" font-family="NanumGothic, Arial, sans-serif" font-size="18" font-weight="700" fill="white">STAR 분석</text>
  <text x="160" y="398" font-family="NanumGothic, Arial, sans-serif" font-size="14" fill="#93C5FD">경험 구조화</text>

  <!-- 카드 2 -->
  <rect x="340" y="335" width="220" height="100" rx="12" fill="#1E3A8A" opacity="0.5"/>
  <text x="360" y="375" font-family="NanumGothic, Arial, sans-serif" font-size="28">💼</text>
  <text x="400" y="373" font-family="NanumGothic, Arial, sans-serif" font-size="18" font-weight="700" fill="white">역량 변환</text>
  <text x="400" y="398" font-family="NanumGothic, Arial, sans-serif" font-size="14" fill="#93C5FD">직무 적합성 분석</text>

  <!-- 카드 3 -->
  <rect x="580" y="335" width="220" height="100" rx="12" fill="#1E3A8A" opacity="0.5"/>
  <text x="600" y="375" font-family="NanumGothic, Arial, sans-serif" font-size="28">📝</text>
  <text x="640" y="373" font-family="NanumGothic, Arial, sans-serif" font-size="18" font-weight="700" fill="white">자소서 피드백</text>
  <text x="640" y="398" font-family="NanumGothic, Arial, sans-serif" font-size="14" fill="#93C5FD">AI 첨삭 서비스</text>

  <!-- 카드 4 -->
  <rect x="820" y="335" width="260" height="100" rx="12" fill="#1E3A8A" opacity="0.5"/>
  <text x="840" y="375" font-family="NanumGothic, Arial, sans-serif" font-size="28">🎤</text>
  <text x="880" y="373" font-family="NanumGothic, Arial, sans-serif" font-size="18" font-weight="700" fill="white">면접 코칭</text>
  <text x="880" y="398" font-family="NanumGothic, Arial, sans-serif" font-size="14" fill="#93C5FD">예상 질문 + 피드백</text>

  <!-- 하단 정보 -->
  <text x="100" y="502" font-family="NanumGothic, Arial, sans-serif" font-size="18" fill="#475569">
    카카오 로그인 · 이메일 로그인 · 분석 기록 저장
  </text>

  <!-- URL 배지 -->
  <rect x="820" y="480" width="320" height="36" rx="18" fill="#1E3A8A" opacity="0.6"/>
  <text x="980" y="502" text-anchor="middle" font-family="NanumGothic, Arial, sans-serif" font-size="15" fill="#93C5FD">
    gwphoenix.github.io/rest_team_project
  </text>
</svg>
